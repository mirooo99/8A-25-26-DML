<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добави място — МестаБГ</title>
  <link rel="stylesheet" href="../Denis/style.css">
  <link rel="stylesheet" href="main-style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-wrap">

<div class="auth-body">
  <div class="card wide">
    <a href="index.html" class="back-link">← Назад към фийда</a>
    <h1>Ново място</h1>
    <p class="auth-sub">Разкажи ни за интересна дестинация или събитие.</p>

    <form id="placeForm">
      <div class="field">
        <label>Име на мястото</label>
        <input type="text" id="pTitle" placeholder="напр. Седемте рилски езера" required>
      </div>
      <div class="field">
        <label>Категория</label>
        <select id="pCategory">
          <option value="Природа">Природа</option>
          <option value="Заведения">Заведения</option>
          <option value="Култура">Култура</option>
          <option value="Други">Други</option>
        </select>
      </div>
      <div class="field">
        <label>Снимка (URL адрес)</label>
        <input type="url" id="pImg" placeholder="https://image-link.com/img.jpg">
      </div>
      <div class="field">
        <label>Описание</label>
        <textarea id="pDesc" rows="4" placeholder="Сподели впечатления..." required></textarea>
      </div>
      <button type="submit" id="saveBtn">Публикувай</button>
      <div id="statusMsg" class="msg"></div>
    </form>
  </div>
</div>

<script src="../Denis/auth.js"></script>
<script src="app.js"></script>
</body>
</html>
