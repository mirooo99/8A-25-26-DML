<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МестаБГ — Вход</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-wrap">

<div class="auth-body">
  <div class="card">
    <h1>Вход</h1>
    <p class="auth-sub">Добре дошъл обратно в <strong>МестаБГ</strong> — платформата за местни събития и интересни места в България.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Имейл</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Парола</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="submitBtn">Вход</button>
      <div class="msg" id="message"></div>
    </form>

    <p class="link">Нямаш акаунт? <a href="signup.html">Регистрирай се</a></p>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const form    = document.getElementById('loginForm');
  const btn     = document.getElementById('submitBtn');
  const message = document.getElementById('message');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      message.textContent = 'Моля попълни всички полета.';
      message.className = 'msg error';
      return;
    }

    btn.disabled = true; btn.textContent = 'Влизане...';
    message.className = 'msg';

    const { error } = await db.auth.signInWithPassword({ email, password });

    btn.disabled = false; btn.textContent = 'Вход';

    if (error) {
      message.textContent = error.message;
      message.className = 'msg error';
    } else {
      message.textContent = 'Успешен вход! Пренасочване...';
      message.className = 'msg success';
      setTimeout(() => { window.location.href = '../index.html'; }, 1200);
    }
  });
</script>

</body>
</html>
